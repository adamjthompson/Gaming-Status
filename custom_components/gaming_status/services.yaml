rename_game:
  name: Rename Game
  description: Rename a game across a player's stored history (merges seconds into the new name if it already exists).
  fields:
    player:
      required: true
      example: "Adam"
      selector:
        text:
    platform:
      required: false
      description: Limit to one platform (e.g. xbox, discord, steam). Omit to search all of the player's platforms.
      selector:
        text:
    old_name:
      required: true
      example: "DOOM Eternal In the menu"
      selector:
        text:
    new_name:
      required: true
      example: "DOOM Eternal"
      selector:
        text:

delete_game:
  name: Delete Game
  description: Permanently purge every trace of a named game from a player's stored history (recent sessions, daily/weekly totals, and archived per-day breakdowns).
  fields:
    player:
      required: true
      example: "Adam"
      selector:
        text:
    platform:
      required: false
      description: Limit to one platform (e.g. xbox, discord, steam). Omit to purge across all of the player's platforms.
      selector:
        text:
    game:
      required: true
      example: "Call of Duty"
      selector:
        text:

delete_session:
  name: Delete Session
  description: Permanently remove one specific recorded session for a game, correcting only that session's contribution to daily/weekly/lifetime totals -- every other session of the same game is left untouched. Only works for sessions still present in that sensor's recent session log; older sessions already folded into the daily history can't be targeted individually.
  fields:
    player:
      required: true
      example: "Adam"
      selector:
        text:
    platform:
      required: false
      description: Limit to one platform (e.g. xbox, discord, steam). Omit to search all of the player's platforms.
      selector:
        text:
    game:
      required: true
      example: "Call of Duty"
      selector:
        text:
    start_time:
      required: true
      description: The exact start_time value (ISO timestamp) of the session to delete, as recorded in that sensor's recent_sessions attribute.
      example: "2026-07-08T09:56:07.162310-04:00"
      selector:
        text:
